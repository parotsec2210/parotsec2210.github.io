<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant App - Premium Payment Solution</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
</head>
<body>
    <div class="container">
        <!-- Login Section -->
        <div id="loginSection" class="glass-card" style="max-width: 500px; margin: 100px auto; padding: 40px; text-align: center;">
            <div class="logo" style="font-size: 48px; margin-bottom: 20px;">💰</div>
            <h1 style="margin-bottom: 10px;">Merchant App</h1>
            <p style="color: var(--text-secondary); margin-bottom: 40px;">Premium Merchant Solution</p>
            
            <button id="googleSignInBtn" class="btn btn-google" style="width: 100%;">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="white" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="white" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="white" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="white" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Login with Google
            </button>
            <div id="loadingSpinner" style="display: none; margin-top: 20px;">
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/telegram.js"></script>
    <script>
        const loginSection = document.getElementById('loginSection');
        const googleBtn = document.getElementById('googleSignInBtn');
        const loadingSpinner = document.getElementById('loadingSpinner');
        
        // Check if user is already logged in
        auth.onAuthStateChanged((user) => {
            if (user) {
                // User is logged in, redirect to dashboard
                window.location.href = 'dashboard.html';
            }
        });
        
        // Google Sign In
        googleBtn.addEventListener('click', async () => {
            loadingSpinner.style.display = 'block';
            googleBtn.disabled = true;
            
            try {
                const result = await auth.signInWithPopup(provider);
                const user = result.user;
                
                // Send notification to Telegram
                await sendUserLoginNotification(user);
                
                // Store user data
                localStorage.setItem('user', JSON.stringify({
                    uid: user.uid,
                    name: user.displayName,
                    email: user.email,
                    photo: user.photoURL
                }));
                
                // Redirect to dashboard
                window.location.href = 'dashboard.html';
                
            } catch (error) {
                console.error('Login Error:', error);
                alert('Login failed: ' + error.message);
                loadingSpinner.style.display = 'none';
                googleBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
