<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Axczyl Merchant - Premium Digital Payment</title>
    
    <!-- Google Fonts + Font Awesome 6 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0C0D12;
            color: #FFFFFF;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Premium Silver Gradient Background */
        .premium-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(180, 190, 210, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, rgba(160, 170, 200, 0.04) 0%, transparent 50%),
                linear-gradient(145deg, #0A0B10 0%, #111218 100%);
            z-index: -2;
        }

        .premium-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 12px);
            pointer-events: none;
        }

        /* Glassmorphic Card */
        .glass-card {
            background: rgba(16, 18, 25, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(200, 210, 240, 0.12);
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.03);
        }

        /* Navbar */
        .navbar {
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(8, 9, 14, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(200, 210, 240, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #E8EDF5, #B8C5D8, #D0D9EA);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo i {
            font-size: 1.6rem;
            background: linear-gradient(135deg, #E8EDF5, #B8C5D8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .admin-badge {
            background: linear-gradient(135deg, #2D2F3E, #1E1F2A);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            border: 1px solid rgba(200, 210, 240, 0.25);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .admin-badge i {
            font-size: 0.75rem;
            color: #FFD700;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(8, 10, 16, 0.96);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(200, 210, 240, 0.1);
            border-radius: 28px 28px 0 0;
            display: flex;
            justify-content: space-around;
            padding: 0.7rem 1rem 1.2rem;
            z-index: 99;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            background: transparent;
            border: none;
            color: #6B7280;
            font-size: 0.7rem;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
        }

        .nav-item i {
            font-size: 1.4rem;
        }

        .nav-item.active {
            color: #CBD5E6;
        }

        .nav-item.active i {
            text-shadow: 0 0 8px rgba(200, 215, 250, 0.5);
        }

        /* Main Content */
        .main-container {
            padding: 1rem 1.2rem 5rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Balance Card */
        .balance-card {
            background: linear-gradient(145deg, #131624, #0E1018);
            border-radius: 28px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(200, 210, 240, 0.12);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .balance-label {
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            color: #8E9AAB;
            text-transform: uppercase;
        }

        .balance-amount {
            font-size: 2.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #F0F4FA, #B8C5D6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        /* Grid & Buttons */
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
            margin: 1rem 0;
        }

        .service-card {
            background: rgba(25, 28, 38, 0.7);
            border: 1px solid rgba(200, 210, 240, 0.1);
            border-radius: 20px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .service-card:hover {
            background: rgba(40, 45, 60, 0.85);
            transform: translateY(-2px);
            border-color: rgba(200, 215, 250, 0.25);
        }

        .service-card i {
            font-size: 1.8rem;
            margin-bottom: 6px;
            color: #B8C5D8;
        }

        .service-card span {
            font-size: 0.8rem;
            font-weight: 500;
        }

        .btn-primary {
            background: linear-gradient(95deg, #2D3342, #1B1E2A);
            border: 1px solid rgba(210, 220, 250, 0.25);
            border-radius: 40px;
            padding: 14px;
            font-weight: 600;
            width: 100%;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary i {
            font-size: 1rem;
        }

        .btn-primary:hover {
            background: linear-gradient(95deg, #3A4052, #252835);
            transform: translateY(-1px);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal-card {
            background: #131624;
            border-radius: 32px;
            padding: 1.5rem;
            width: 90%;
            max-width: 380px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .modal-card h3 {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1rem;
        }

        .input-field {
            background: #1A1D28;
            border: 1px solid #2D3242;
            border-radius: 40px;
            padding: 12px 18px;
            width: 100%;
            color: white;
            margin: 8px 0;
            font-size: 0.9rem;
        }

        .input-field:focus {
            outline: none;
            border-color: #8E9AAB;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 20px;
            right: 20px;
            background: #1E212CD9;
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            border-radius: 40px;
            border-left: 4px solid #4CAF50;
            z-index: 300;
            text-align: center;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .text-muted {
            color: #8E9AAB;
            font-size: 0.7rem;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        hr {
            border-color: rgba(255, 255, 255, 0.06);
            margin: 1rem 0;
        }

        /* Admin Table */
        .admin-table {
            width: 100%;
            font-size: 0.7rem;
        }

        .admin-table td, .admin-table th {
            padding: 10px 4px;
            border-bottom: 1px solid #2A2E3C;
            text-align: left;
        }

        .badge-pending {
            background: #FF9800;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.6rem;
        }

        .btn-small {
            background: #2D3342;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 0.7rem;
        }
    </style>
</head>

<!-- LOGIN SCREEN -->

<script>
    let currentUser = null;
    let currentTab = 'home';
    let userBalance = 0;
    let transactions = [];
    let isAdmin = false;

    function formatRp(amount) {
        return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(amount);
    }

    function showToast(msg, isErr = false) {
        let t = document.createElement('div');
        t.className = 'toast';
        t.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
        t.style.borderLeftColor = isErr ? '#F44336' : '#4CAF50';
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2800);
    }

    async function sendTelegram(msg) {
        if (TELEGRAM_TOKEN && TELEGRAM_CHAT_ID) {
            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=HTML`
                });
            } catch (e) { console.warn(e); }
        }
    }

    // Data persistence
    function loadUserData(email) {
        let all = JSON.parse(localStorage.getItem('axczyl_users') || '{}');
        if (!all[email]) all[email] = { balance: 0, transactions: [], pendingDeposits: [] };
        userBalance = all[email].balance;
        transactions = all[email].transactions || [];
        return all[email];
    }

    function saveUserData(email, balance, txList, pending = null) {
        let all = JSON.parse(localStorage.getItem('axczyl_users') || '{}');
        if (!all[email]) all[email] = { pendingDeposits: [] };
        all[email].balance = balance;
        all[email].transactions = txList;
        if (pending !== null) all[email].pendingDeposits = pending;
        localStorage.setItem('axczyl_users', JSON.stringify(all));
    }

    function persist() {
        if (currentUser) saveUserData(currentUser.email, userBalance, transactions);
    }

    function addTransaction(type, method, amount, fee, detail, status = 'success') {
        let total = amount + fee;
        let tx = { id: Date.now(), type, method, nominal: amount, fee, total, detail, date: new Date().toISOString(), status };
        transactions.unshift(tx);
        if (status === 'success' && type === 'DEPOSIT') userBalance += total;
        else if (status === 'success' && ['TOPUP E-WALLET', 'TOPUP BANK', 'ISI PULSA', 'PAKET DATA'].includes(type)) {
            if (userBalance >= total) userBalance -= total;
            else return false;
        }
        persist();
        renderCurrentView();
        return true;
    }

    // Deposit
    function submitDeposit() {
        let amount = parseInt(document.getElementById('depositNominal')?.value);
        let proof = document.getElementById('depositProof')?.value;
        if (!amount || amount < 10000) { showToast("Minimal deposit Rp10.000", true); return; }
        if (!proof) { showToast("Masukkan link bukti transfer", true); return; }
        let total = amount + ADMIN_FEE;

        let all = JSON.parse(localStorage.getItem('axczyl_users') || '{}');
        let userData = all[currentUser.email] || { balance: 0, transactions: [], pendingDeposits: [] };
        if (!userData.pendingDeposits) userData.pendingDeposits = [];
        let pending = {
            id: Date.now(),
            amount: amount,
            fee: ADMIN_FEE,
            total: total,
            proof: proof,
            date: new Date().toISOString(),
            status: 'pending',
            userEmail: currentUser.email,
            userName: currentUser.displayName || currentUser.email
        };
        userData.pendingDeposits.push(pending);
        all[currentUser.email] = userData;
        localStorage.setItem('axczyl_users', JSON.stringify(all));

        sendTelegram(`💸 DEPOSIT PENDING\n👤 ${currentUser.email}\n💰 ${formatRp(amount)}\n📎 Bukti: ${proof}\n🆔 ${pending.id}`);
        showToast(`Deposit ${formatRp(total)} diajukan, menunggu konfirmasi admin.`);
        closeModal('depositModal');
        renderCurrentView();
    }

    function openDana() { window.open(`https://link.dana.id/qr/${DANA_NUMBER}`, '_blank'); }
    function openGopay() { window.open(`https://gopay.co.id/app/merchanttransfer?tref=${GOPAY_NUMBER}`, '_blank'); }
    function openQRIS() { window.open(QRIS_URL, '_blank'); }

    // Services
    const services = {
        'TOPUP E-WALLET': ['Dana', 'GoPay', 'OVO', 'ShopeePay'],
        'TOPUP BANK': ['BCA', 'BRI', 'BNI', 'Mandiri'],
        'ISI PULSA': ['Telkomsel', 'Indosat', 'XL', 'Tri'],
        'PAKET DATA': ['Telkomsel 5GB', 'Indosat 10GB', 'XL 8GB', 'By.U 6GB']
    };

    function showTopupModal() {
        let html = `<h3><i class="fas fa-shopping-cart"></i> Layanan Topup</h3><div class="grid-2">`;
        for (let cat in services) {
            let icon = cat.includes('WALLET') ? 'fa-wallet' : cat.includes('BANK') ? 'fa-university' : cat.includes('PULSA') ? 'fa-mobile-alt' : 'fa-wifi';
            html += `<div class="service-card" onclick="showProvider('${cat}')"><i class="fas ${icon}"></i><span>${cat}</span></div>`;
        }
        html += `</div><button class="btn-primary" onclick="closeModal('topupModal')"><i class="fas fa-times"></i> Tutup</button>`;
        document.getElementById('topupDynamicContent').innerHTML = html;
        document.getElementById('topupModal').style.display = 'flex';
    }

    window.showProvider = (category) => {
        let subs = services[category];
        let html = `<h3><i class="fas fa-layer-group"></i> ${category}</h3><div class="grid-2">`;
        subs.forEach(p => { html += `<div class="service-card" onclick="showAmountInput('${category}','${p}')"><i class="fas fa-tag"></i><span>${p}</span></div>`; });
        html += `</div><button class="btn-primary" onclick="showTopupModal()"><i class="fas fa-arrow-left"></i> Kembali</button>`;
        document.getElementById('topupDynamicContent').innerHTML = html;
    };

    window.showAmountInput = (category, provider) => {
        document.getElementById('topupDynamicContent').innerHTML = `
            <h3><i class="fas fa-coins"></i> ${category} - ${provider}</h3>
            <input type="number" id="topupAmount" class="input-field" placeholder="Nominal (Rp)" min="5000">
            <p class="text-muted"><i class="fas fa-receipt"></i> Admin fee: Rp800 | Total: <span id="topupTotal">Rp0</span></p>
            <button class="btn-primary" onclick="processTopup('${category}','${provider}')"><i class="fas fa-check-circle"></i> Bayar Pakai Saldo</button>
            <button class="btn-primary" style="margin-top:8px; background:#1A1D28;" onclick="showProvider('${category}')"><i class="fas fa-arrow-left"></i> Kembali</button>
        `;
        document.getElementById('topupAmount')?.addEventListener('input', function () { let v = parseInt(this.value) || 0; document.getElementById('topupTotal').innerText = formatRp(v + ADMIN_FEE); });
    };

    window.processTopup = (category, provider) => {
        let amount = parseInt(document.getElementById('topupAmount')?.value);
        if (!amount || amount < 5000) { showToast("Minimal Rp5.000", true); return; }
        let total = amount + ADMIN_FEE;
        if (userBalance < total) { showToast(`Saldo tidak cukup (${formatRp(userBalance)})`, true); return; }
        if (addTransaction(category, provider, amount, ADMIN_FEE, `${category} - ${provider}`, 'success')) {
            sendTelegram(`✅ ${category}\n👤 ${currentUser.email}\n${provider} - ${formatRp(amount)}`);
            showToast(`Berhasil ${category} ${provider}`);
            closeModal('topupModal');
        }
    };

    // Render UI
    function renderHome() {
        let pendingCount = 0;
        let all = JSON.parse(localStorage.getItem('axczyl_users') || '{}');
        if (all[currentUser.email]?.pendingDeposits) pendingCount = all[currentUser.email].pendingDeposits.filter(p => p.status === 'pending').length;

        document.getElementById('mainView').innerHTML = `
            <div class="balance-card">
                <div class="balance-label"><i class="fas fa-circle-info"></i> SALDO AKTIF</div>
                <div class="balance-amount">${formatRp(userBalance)}</div>
                <button class="btn-primary" id="depositBtn" style="margin-top:16px;"><i class="fas fa-download"></i> Deposit Saldo (Transfer)</button>
                ${pendingCount > 0 ? `<p class="text-muted" style="margin-top:8px;"><i class="fas fa-clock"></i> ${pendingCount} deposit menunggu konfirmasi admin</p>` : ''}
            </div>
            <button class="btn-primary" id="topupBtn"><i class="fas fa-cart-plus"></i> Topup / Beli Layanan</button>
            <div class="glass-card" style="margin-top:20px; padding:1rem;">
                <div style="font-weight:600; margin-bottom:10px;"><i class="fas fa-history"></i> Transaksi Terbaru</div>
                <div id="recentTx"></div>
            </div>
        `;
        document.getElementById('depositBtn')?.addEventListener('click', () => document.getElementById('depositModal').style.display = 'flex');
        document.getElementById('topupBtn')?.addEventListener('click', showTopupModal);
        let recent = transactions.slice(0, 3);
        let html = recent.length ? recent.map(t => `<div class="flex-between" style="padding:10px 0; border-bottom:1px solid #2A2E3C;"><div><b>${t.type}</b><br><span class="text-muted">${new Date(t.date).toLocaleDateString()}</span></div><div>${formatRp(t.total)}</div></div>`).join('') : '<p class="text-muted"><i class="fas fa-inbox"></i> Belum ada transaksi</p>';
        document.getElementById('recentTx').innerHTML = html;
    }

    function renderProfile() {
        document.getElementById('mainView').innerHTML = `
            <div class="balance-card" style="text-align:center;">
                <i class="fas fa-user-circle" style="font-size:3rem; color:#B8C5D8;"></i>
                <h3 style="margin:8px 0;">${currentUser.displayName || currentUser.email.split('@')[0]}</h3>
                <p class="text-muted">${currentUser.email}</p>
                <hr>
                <div class="flex-between"><span><i class="fas fa-wallet"></i> Saldo</span><span>${formatRp(userBalance)}</span></div>
                <button id="logoutBtn" class="btn-primary" style="margin-top:20px; background:#2C1E1E;"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        `;
        document.getElementById('logoutBtn')?.addEventListener('click', async () => { await auth.signOut(); location.reload(); });
        if (isAdmin) {
            let btn = document.createElement('button');
            btn.className = 'btn-primary';
            btn.innerHTML = '<i class="fas fa-shield-alt"></i> Admin Panel';
            btn.style.marginTop = '12px';
            btn.onclick = () => document.getElementById('adminModal').style.display = 'flex';
            document.querySelector('#mainView .balance-card').appendChild(btn);
        }
    }

    function renderHistory() {
        let html = `<div class="glass-card" style="padding:1rem;"><h3 style="margin-bottom:10px;"><i class="fas fa-list-ul"></i> Riwayat Transaksi</h3>`;
        if (transactions.length) {
            transactions.forEach(t => {
                html += `<div class="flex-between" style="padding:12px 0; border-bottom:1px solid #2A2E3C;">
                            <div><b>${t.type}</b><br><span class="text-muted">${t.detail}</span><br><small>${new Date(t.date).toLocaleString()}</small></div>
                            <div>${formatRp(t.total)}</div>
                         </div>`;
            });
        } else html += `<p class="text-muted"><i class="fas fa-inbox"></i> Kosong</p>`;
        html += `</div>`;
        document.getElementById('mainView').innerHTML = html;
    }

    function renderCurrentView() {
        if (currentTab === 'home') renderHome();
        else if (currentTab === 'profile') renderProfile();
        else if (currentTab === 'history') renderHistory();
        document.querySelectorAll('.nav-item').forEach(btn => {
            if (btn.dataset.nav === currentTab) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    // Admin Functions
    function adminShowPending() {
        let all = JSON.parse(localStorage.getItem('axczyl_users') || '{}');
        let pendings = [];
        for (let email in all) {
            if (all[email].pendingDeposits) pendings.push(...all[email].pendingDeposits.filter(p => p.status === 'pending').map(p => ({ ...p, userEmail: email })));
        }
        if (!pendings.length) { document.getElementById('adminContent').innerHTML = '<p class="text-muted"><i class="fas fa-check-circle"></i> Tidak ada pending deposit</p>'; return; }
        let html = '<table class="admin-table"><tr><th>User</th><th>Nominal</th><th>Bukti</th><th>Aksi</th></tr>';
        pendings.forEach(p => {
            html += `<tr><td>${p.userEmail.split('@')[0]}</td><td>${formatRp(p.total)}</td><td><a href="${p.proof}" target="_blank" style="color:#B8C5D8;"><i class="fas fa-external-link-alt"></i> Lihat</a></td><td><button class="btn-small" onclick="confirmDeposit('${p.id}','${p.userEmail}',${p.amount},${p.fee})"><i class="fas fa-check"></i> Konfirmasi</button></td></tr>`;
        });
        html += '</table>';
        document.getElementById('adminContent').innerHTML = html;
    }

    window.confirmDeposit = (id, email, amount, fee) => {
        let all = JSON.parse(localStorage.getItem('axczyl_users') || '{}');
        let user = all[email];
        if (user && user.pendingDeposits) {
            let idx = user.pendingDeposits.findIndex(p => p.id == id);
            if (idx !== -1 && user.pendingDeposits[idx].status === 'pending') {
                user.pendingDeposits[idx].status = 'success';
                user.balance = (user.balance || 0) + amount + fee;
                let tx = { id: Date.now(), type: 'DEPOSIT', method: 'Manual Transfer', nominal: amount, fee: fee, total: amount + fee, detail: `Deposit via transfer (Confirmed Admin)`, date: new Date().toISOString(), status: 'success' };
                if (!user.transactions) user.transactions = [];
                user.transactions.unshift(tx);
                all[email] = user;
                localStorage.setItem('axczyl_users', JSON.stringify(all));
                sendTelegram(`✅ DEPOSIT CONFIRMED! +${formatRp(amount + fee)}\n👤 ${email}`);
                showToast(`Deposit ${formatRp(amount + fee)} dikonfirmasi`);
                adminShowPending();
                if (currentUser && currentUser.email === email) { loadUserData(email); renderCurrentView(); }
            }
        }
    };

    function adminShowUsers() {
        let all = JSON.parse(localStorage.getItem('axczyl_users') || '{}');
        let html = '<table class="admin-table"><tr><th>Email</th><th>Saldo</th><th>Aksi</th></tr>';
        for (let email in all) {
            html += `<tr><td>${email}</td><td>${formatRp(all[email].balance || 0)}</td><td><button class="btn-small" onclick="adminAddBalance('${email}')"><i class="fas fa-plus"></i> Tambah</button></td></tr>`;
        }
        html += '</table>';
        document.getElementById('adminContent').innerHTML = html;
    }

    window.adminAddBalance = (email) => {
        let amount = prompt("Masukkan nominal tambahan saldo:", "50000");
        if (amount && !isNaN(amount) && parseInt(amount) > 0) {
            let all = JSON.parse(localStorage.getItem('axczyl_users') || '{}');
            if (all[email]) {
                all[email].balance = (all[email].balance || 0) + parseInt(amount);
                let tx = { id: Date.now(), type: 'ADMIN BONUS', method: 'Manual', nominal: parseInt(amount), fee: 0, total: parseInt(amount), detail: `Tambah saldo oleh admin`, date: new Date().toISOString(), status: 'success' };
                if (!all[email].transactions) all[email].transactions = [];
                all[email].transactions.unshift(tx);
                localStorage.setItem('axczyl_users', JSON.stringify(all));
                showToast(`Saldo ${email} +${formatRp(parseInt(amount))}`);
                adminShowUsers();
                if (currentUser && currentUser.email === email) { loadUserData(email); renderCurrentView(); }
            }
        }
    };

    function adminShowAllTx() {
        let all = JSON.parse(localStorage.getItem('axczyl_users') || '{}');
        let allTx = [];
        for (let email in all) if (all[email].transactions) allTx.push(...all[email].transactions.map(t => ({ ...t, userEmail: email })));
        allTx.sort((a, b) => b.id - a.id);
        let html = '<table class="admin-table"><tr><th>User</th><th>Tipe</th><th>Total</th><th>Waktu</th></tr>';
        allTx.slice(0, 30).forEach(t => { html += `<tr><td>${t.userEmail.split('@')[0]}</td><td>${t.type}</td><td>${formatRp(t.total)}</td><td>${new Date(t.date).toLocaleString()}</td></tr>`; });
        html += '</table>';
        document.getElementById('adminContent').innerHTML = html;
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    window.closeModal = closeModal;

    // Auth
    auth.onAuthStateChanged((user) => {
        if (user) {
            currentUser = user;
            isAdmin = (user.email === ADMIN_EMAIL);
            loadUserData(user.email);
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            if (isAdmin) document.getElementById('adminBadge').innerHTML = '<div class="admin-badge"><i class="fas fa-crown"></i> Admin</div>';
            renderCurrentView();
            document.querySelectorAll('.nav-item').forEach(btn => { btn.onclick = () => { currentTab = btn.dataset.nav; renderCurrentView(); }; });
        } else {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('appContainer').style.display = 'none';
        }
    });

    document.getElementById('googleLoginBtn')?.addEventListener('click', async () => { await auth.signInWithPopup(provider); });
    document.getElementById('submitDepositBtn')?.addEventListener('click', submitDeposit);
    document.getElementById('depositNominal')?.addEventListener('input', function () { let val = parseInt(this.value) || 0; document.getElementById('totalTransfer').innerText = formatRp(val + ADMIN_FEE); });
</script>
</body>
</html>
