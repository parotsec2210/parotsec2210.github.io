<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Axczyl Merchant - Premium + Admin Panel</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0c;
            color: #ffffff;
            overflow-x: hidden;
        }
        .bg-3d {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 30% 10%, rgba(45,55,65,0.4) 0%, #0a0a0c 90%);
            z-index: -2;
        }
        .glass-premium {
            background: rgba(18,20,28,0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(192,192,208,0.2);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.6);
        }
        .navbar {
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10,10,15,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,240,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-brand {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #E0E0E0, #B0B0C0, #E8E8E8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .admin-badge {
            background: #F44336;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(12,14,20,0.92);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.08);
            border-radius: 1.8rem 1.8rem 0 0;
            display: flex;
            justify-content: space-around;
            padding: 0.7rem 1rem 1.2rem;
            z-index: 99;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: transparent;
            border: none;
            color: #88889a;
            font-size: 0.7rem;
            transition: all 0.2s;
            cursor: pointer;
        }
        .nav-item.active { color: #D4D4E8; text-shadow: 0 0 6px rgba(200,200,255,0.4); }
        .nav-icon { font-size: 1.6rem; }
        .main-container { padding: 1rem 1.2rem 5.5rem 1.2rem; max-width: 600px; margin: 0 auto; }
        .balance-card {
            background: linear-gradient(145deg, #1A1C24, #111217);
            border-radius: 2rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(210,210,230,0.2);
        }
        .balance-amount {
            font-size: 2.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #E8E8F0, #C0C0D8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .service-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .service-card {
            background: rgba(30,32,42,0.7);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(180,180,200,0.15);
            transition: 0.2s;
        }
        .service-card:hover { transform: translateY(-3px); background: rgba(45,48,60,0.8); }
        .service-emoji { font-size: 2rem; }
        .btn-gradient {
            background: linear-gradient(95deg, #2C2E3E, #1E1F2A);
            border: 1px solid rgba(210,210,240,0.3);
            border-radius: 3rem;
            padding: 12px 20px;
            font-weight: 600;
            color: white;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #12141c;
            border-radius: 2rem;
            padding: 1.8rem;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .input-silver {
            background: #1e1f2a;
            border: 1px solid #35384a;
            border-radius: 2rem;
            padding: 12px 18px;
            width: 100%;
            color: white;
            margin: 10px 0;
        }
        .toast {
            position: fixed;
            bottom: 80px;
            left: 20px;
            right: 20px;
            background: #1e1f2ad9;
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            border-radius: 40px;
            border-left: 4px solid #4CAF50;
            z-index: 300;
            text-align: center;
            font-weight: 500;
        }
        .text-muted { color: #8f8fa0; font-size: 0.75rem; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        hr { border-color: rgba(255,255,255,0.1); margin: 1rem 0; }
        .admin-table { width: 100%; font-size: 0.8rem; }
        .admin-table td, .admin-table th { padding: 10px 5px; border-bottom: 1px solid #2a2c38; }
        .btn-small { padding: 5px 12px; font-size: 0.7rem; margin: 2px; border-radius: 20px; background: #2c2e3a; border: none; color: white; cursor: pointer; }
        .status-pending { background: #ff9800; padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; }
        .status-success { background: #4caf50; padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; }
    </style>
</head>

<!-- LOGIN -->
<div id="loginSection" style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div class="glass-premium" style="padding: 2rem; text-align:center; max-width:400px; width:100%;">
        <div style="font-size:4rem;">💎</div>
        <h1 style="font-size:2rem;">Axczyl Merchant</h1>
        <p class="text-muted">Premium Payment Solution</p>
        <button id="googleSignInBtn" style="background:#2D2F3A; border:none; border-radius:3rem; padding:14px; width:100%; margin-top:28px; display:flex; gap:12px; justify-content:center; align-items:center; color:white;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#fff"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#fff"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#fff"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#fff"/></svg>

<!-- APP -->
<div id="appContainer" style="display:none;">
    <div class="navbar">
        <div class="logo-brand">⚡ AXCZYL</div>
        <div id="adminIndicator"></div>
    </div>
    <div class="main-container" id="mainView"></div>
    <div class="bottom-nav" id="bottomNav">
        <button class="nav-item" data-nav="home">🏠<span>HOME</span></button>

<!-- Modal Deposit (Manual) -->
<div id="depositModal" class="modal">
    <div class="modal-content">
        <h3>💰 Deposit Saldo</h3>
        <label>Nominal (Rp)</label>
        <input type="number" id="depositAmount" class="input-silver" placeholder="Minimal 10.000">
        <p class="text-muted">Biaya admin +Rp 800 | Total: <span id="totalBayarDisplay">0</span></p>
        <div class="service-grid" style="margin:10px 0">
            <div class="service-card" onclick="selectPaymentMethod('QRIS')" id="methodQRIS">📱 QRIS</div>
            <div class="service-card" onclick="selectPaymentMethod('Dana')" id="methodDana">💰 Dana</div>
            <div class="service-card" onclick="selectPaymentMethod('GoPay')" id="methodGoPay">🐹 GoPay</div>
        </div>
        <p id="selectedMethodText" class="text-muted" style="margin:5px 0">Belum pilih metode</p>
        <button id="confirmDepositBtn" class="btn-gradient">📤 Ajukan Deposit</button>
        <button class="btn-gradient" style="margin-top:8px; background:#2a2a36;" onclick="closeModal('depositModal')">Tutup</button>
    </div>
</div>

<!-- Modal Admin Panel (khusus admin) -->
<div id="adminModal" class="modal">
    <div class="modal-content" style="max-width: 95%; max-height: 80vh; overflow-y: auto;">
        <h3>🔐 ADMIN PANEL</h3>
        <div style="margin: 15px 0;">
            <button class="btn-small" onclick="adminShowPending()">⏳ Pending Konfirmasi</button>
            <button class="btn-small" onclick="adminShowAllUsers()">👥 Semua User & Saldo</button>
            <button class="btn-small" onclick="adminShowAllTransactions()">📜 Semua Transaksi</button>
            <button class="btn-small" onclick="adminAddBalanceForm()">➕ Tambah Saldo Manual</button>
        </div>
        <div id="adminContent">Klik menu di atas</div>
        <button class="btn-gradient" style="margin-top:15px;" onclick="closeModal('adminModal')">Tutup</button>
    </div>
</div>

<script>
    let currentUser = null;
    let currentTab = 'home';
    let userBalance = 0;
    let transactions = [];
    let isAdmin = false;
    let selectedPaymentMethod = null;
    
    const ADMIN_FEE = 800;
    
    // Load data from localStorage
    function loadUserData(email) {
        let allUsers = JSON.parse(localStorage.getItem('merchant_users') || '{}');
        if(!allUsers[email]) allUsers[email] = { balance: 0, transactions: [], pendingDeposits: [] };
        userBalance = allUsers[email].balance;
        transactions = allUsers[email].transactions || [];
        return allUsers[email];
    }
    
    function saveUserData(email, balance, txList, pending = null) {
        let allUsers = JSON.parse(localStorage.getItem('merchant_users') || '{}');
        if(!allUsers[email]) allUsers[email] = { transactions: [], pendingDeposits: [] };
        allUsers[email].balance = balance;
        allUsers[email].transactions = txList;
        if(pending !== null) allUsers[email].pendingDeposits = pending;
        localStorage.setItem('merchant_users', JSON.stringify(allUsers));
    }
    
    function persist() { if(currentUser) saveUserData(currentUser.email, userBalance, transactions); }
    
    function formatRupiah(amount) { return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(amount); }
    function showToast(msg, isErr=false) { let t = document.createElement('div'); t.className = 'toast'; t.style.borderLeftColor = isErr ? '#F44336' : '#4CAF50'; t.innerHTML = `${isErr ? '⚠️' : '✅'} ${msg}`; document.body.appendChild(t); setTimeout(()=>t.remove(), 2800); }
    
    async function sendTelegramNotification(message) {
        if(TELEGRAM_BOT_TOKEN && TELEGRAM_CHAT_ID) {
            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
                    body:`chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(message)}&parse_mode=HTML`
                });
            } catch(e) { console.warn(e); }
        }
    }
    
    // Add transaction
    function addTransaction(type, method, amount, fee, detail, status='success') {
        let total = amount + fee;
        let newTx = { id: Date.now(), type, method, nominal: amount, fee, total, detail, date: new Date().toISOString(), status };
        transactions.unshift(newTx);
        if(status === 'success' && type === 'DEPOSIT') userBalance += total;
        else if(status === 'success' && (type === 'TOPUP E-WALLET' || type === 'TOPUP BANK' || type === 'ISI PULSA' || type === 'PAKET DATA')) {
            if(userBalance >= total) userBalance -= total;
            else return false;
        }
        persist();
        renderCurrentView();
        return true;
    }
    
    // Submit deposit (manual pending)
    function submitDeposit() {
        let amount = parseInt(document.getElementById('depositAmount')?.value);
        if(!amount || amount < 10000) { showToast("Minimal deposit Rp10.000", true); return; }
        if(!selectedPaymentMethod) { showToast("Pilih metode pembayaran", true); return; }
        let total = amount + ADMIN_FEE;
        
        let allUsers = JSON.parse(localStorage.getItem('merchant_users') || '{}');
        let userData = allUsers[currentUser.email] || { balance: 0, transactions: [], pendingDeposits: [] };
        if(!userData.pendingDeposits) userData.pendingDeposits = [];
        
        let pending = {
            id: Date.now(),
            amount: amount,
            fee: ADMIN_FEE,
            total: total,
            method: selectedPaymentMethod,
            date: new Date().toISOString(),
            status: 'pending',
            userEmail: currentUser.email,
            userName: currentUser.displayName || currentUser.email
        };
        userData.pendingDeposits.push(pending);
        allUsers[currentUser.email] = userData;
        localStorage.setItem('merchant_users', JSON.stringify(allUsers));
        
        sendTelegramNotification(`💸 DEPOSIT PENDING\n👤 ${currentUser.email}\n💰 ${formatRupiah(amount)}\n💳 ${selectedPaymentMethod}\n🆔 ${pending.id}\n🔗 ADMIN harus konfirmasi di panel admin`);
        showToast(`Pengajuan deposit ${formatRupiah(total)} berhasil! Menunggu konfirmasi admin.`);
        closeModal('depositModal');
        renderCurrentView();
    }
    
    // SERVICE TOPUP (PAKAI SALDO)
    const services = [
        { name: 'TOPUP E-WALLET', emoji:'💳', sub: ['Dana','GoPay','OVO','ShopeePay'] },
        { name: 'TOPUP BANK', emoji:'🏦', sub: ['BCA','BRI','BNI','Mandiri'] },
        { name: 'ISI PULSA', emoji:'📞', sub: ['Telkomsel','Indosat','XL','Tri'] },
        { name: 'PAKET DATA', emoji:'🌐', sub: ['Telkomsel 5GB','Indosat 10GB','XL 8GB','By.U 6GB'] }
    ];
    
    function showServiceList() {
        let html = `<h3>🛒 Layanan (Pakai Saldo)</h3><div class="service-grid">`;
        services.forEach(s => { html += `<div class="service-card" onclick="showProviderList('${s.name}','${s.emoji}','${JSON.stringify(s.sub)}')"><div class="service-emoji">${s.emoji}</div><div>${s.name}</div></div>`; });
        html += `</div><button class="btn-gradient" onclick="closeServiceModal()">Tutup</button>`;
        document.getElementById('modalDynamicContent').innerHTML = html;
        document.getElementById('actionModal').style.display = 'flex';
    }
    
    window.showProviderList = (category, emoji, subsJson) => {
        let subs = JSON.parse(subsJson);
        let inner = `<h3>${emoji} ${category}</h3>`;
        subs.forEach(prov => { inner += `<div class="service-card" style="margin-bottom:12px;" onclick="showNominalInput('${category}','${prov}')"><strong>${prov}</strong></div>`; });
        inner += `<button class="btn-gradient" onclick="showServiceList()">Kembali</button>`;
        document.getElementById('modalDynamicContent').innerHTML = inner;
    };
    
    window.showNominalInput = (category, provider) => {
        document.getElementById('modalDynamicContent').innerHTML = `<h3>${category} - ${provider}</h3><label>Nominal (Rp)</label><input type="number" id="serviceAmount" class="input-silver" placeholder="Min 5000"><p class="text-muted">Admin +Rp ${ADMIN_FEE.toLocaleString()}</p><button class="btn-gradient" onclick="executeTopup('${category}','${provider}')">Bayar Pakai Saldo</button><button class="btn-gradient" style="margin-top:6px;background:#222;" onclick="showProviderList('${category}','','${JSON.stringify([provider])}')">Kembali</button>`;
    };
    
    window.executeTopup = (category, provider) => {
        let amount = parseInt(document.getElementById('serviceAmount')?.value);
        if(!amount || amount < 5000) { showToast("Minimal Rp5.000", true); return; }
        let total = amount + ADMIN_FEE;
        if(userBalance < total) { showToast(`Saldo tidak cukup (${formatRupiah(userBalance)})`, true); return; }
        if(addTransaction(category, provider, amount, ADMIN_FEE, `${category} - ${provider}`, 'success')) {
            sendTelegramNotification(`✅ ${category}\n👤 ${currentUser.email}\n${provider} - ${formatRupiah(amount)}\nAdmin ${formatRupiah(ADMIN_FEE)}`);
            showToast(`Berhasil ${category} ${provider}`);
            closeServiceModal();
        }
    };
    
    window.closeServiceModal = () => { document.getElementById('actionModal').style.display = 'none'; };
    
    // UI RENDER
    function renderHome() {
        let pendingCount = 0;
        let allUsers = JSON.parse(localStorage.getItem('merchant_users') || '{}');
        if(allUsers[currentUser.email]?.pendingDeposits) pendingCount = allUsers[currentUser.email].pendingDeposits.filter(p => p.status === 'pending').length;
        
        document.getElementById('mainView').innerHTML = `
            <div class="balance-card">
                <div class="balance-label">SALDO UTAMA</div>
                <div class="balance-amount">${formatRupiah(userBalance)}</div>
                <button class="btn-gradient" id="depositBtn" style="margin-top:16px;">💸 Deposit (QRIS/Dana/GoPay)</button>
                ${pendingCount > 0 ? `<p class="text-muted" style="margin-top:8px;">⏳ Ada ${pendingCount} deposit pending konfirmasi</p>` : ''}
            </div>
            <button class="btn-gradient" id="topupServiceBtn">🛒 Beli / Topup (Pakai Saldo)</button>
            <div class="transaction-history" style="margin-top:20px;"><div style="font-weight:600;">📜 Transaksi Terakhir</div><div id="recentTxList"></div></div>
        `;
        document.getElementById('depositBtn')?.addEventListener('click', () => { document.getElementById('depositModal').style.display = 'flex'; });
        document.getElementById('topupServiceBtn')?.addEventListener('click', showServiceList);
        let recent = transactions.slice(0,4);
        let txHtml = recent.length ? recent.map(t => `<div class="flex-between" style="padding:10px 0; border-bottom:1px solid #2a2c38;"><div><b>${t.type}</b><br><span class="text-muted">${new Date(t.date).toLocaleDateString()}</span></div><div>${formatRupiah(t.total)}</div></div>`).join('') : '<p class="text-muted">Belum ada</p>';
        document.getElementById('recentTxList').innerHTML = txHtml;
    }
    
    function renderProfile() {
        document.getElementById('mainView').innerHTML = `<div class="balance-card" style="text-align:center;"><div style="font-size:3rem;">👤</div><h3>${currentUser.displayName || currentUser.email}</h3><p class="text-muted">${currentUser.email}</p><hr><div class="flex-between"><span>💰 Saldo</span><span>${formatRupiah(userBalance)}</span></div><button id="logoutBtn" class="btn-gradient" style="margin-top:20px; background:#2c1e1e;">Logout</button></div>`;
        document.getElementById('logoutBtn')?.addEventListener('click', async()=>{ await auth.signOut(); location.reload(); });
        if(isAdmin) {
            let btn = document.createElement('button');
            btn.className = 'btn-gradient';
            btn.innerText = '🔐 Buka Admin Panel';
            btn.style.marginTop = '12px';
            btn.onclick = () => document.getElementById('adminModal').style.display = 'flex';
            document.querySelector('#mainView .balance-card').appendChild(btn);
        }
    }
    
    function renderHistory() {
        let html = `<div class="transaction-history"><h3>📋 Riwayat Lengkap</h3>`;
        if(transactions.length) transactions.forEach(t => { html += `<div class="flex-between" style="padding:12px 0; border-bottom:1px solid #2a2c38;"><div><b>${t.type}</b><br><span class="text-muted">${t.detail}</span><br><small>${new Date(t.date).toLocaleString()}</small></div><div>${formatRupiah(t.total)}</div></div>`; });
        else html += `<p class="text-muted">Kosong</p>`;
        html += `</div>`;
        document.getElementById('mainView').innerHTML = html;
    }
    
    function renderCurrentView() {
        if(currentTab === 'home') renderHome();
        else if(currentTab === 'profile') renderProfile();
        else if(currentTab === 'history') renderHistory();
        document.querySelectorAll('.nav-item').forEach(btn => { if(btn.getAttribute('data-nav') === currentTab) btn.classList.add('active'); else btn.classList.remove('active'); });
    }
    
    // ADMIN FUNCTIONS
    function adminShowPending() {
        let allUsers = JSON.parse(localStorage.getItem('merchant_users') || '{}');
        let pendings = [];
        for(let email in allUsers) {
            if(allUsers[email].pendingDeposits) pendings.push(...allUsers[email].pendingDeposits.filter(p => p.status === 'pending').map(p => ({...p, userEmail: email})));
        }
        if(!pendings.length) { document.getElementById('adminContent').innerHTML = '<p>Tidak ada pending deposit</p>'; return; }
        let html = '<table class="admin-table"><tr><th>User</th><th>Jumlah</th><th>Metode</th><th>Aksi</th></tr>';
        pendings.forEach(p => {
            html += `<tr><td>${p.userEmail.split('@')[0]}</td><td>${formatRupiah(p.total)}</td><td>${p.method}</td><td><button class="btn-small" onclick="confirmDeposit('${p.id}','${p.userEmail}',${p.amount},${p.fee})">✅ Konfirmasi</button></td></tr>`;
        });
        html += '</table>';
        document.getElementById('adminContent').innerHTML = html;
    }
    
    window.confirmDeposit = (id, email, amount, fee) => {
        let allUsers = JSON.parse(localStorage.getItem('merchant_users') || '{}');
        let user = allUsers[email];
        if(user && user.pendingDeposits) {
            let index = user.pendingDeposits.findIndex(p => p.id == id);
            if(index !== -1 && user.pendingDeposits[index].status === 'pending') {
                user.pendingDeposits[index].status = 'success';
                user.balance = (user.balance || 0) + amount + fee;
                let tx = { id: Date.now(), type: 'DEPOSIT', method: user.pendingDeposits[index].method, nominal: amount, fee: fee, total: amount+fee, detail: `Deposit via ${user.pendingDeposits[index].method} (Confirmed Admin)`, date: new Date().toISOString(), status: 'success' };
                if(!user.transactions) user.transactions = [];
                user.transactions.unshift(tx);
                allUsers[email] = user;
                localStorage.setItem('merchant_users', JSON.stringify(allUsers));
                sendTelegramNotification(`✅ DEPOSIT CONFIRMED!\n👤 ${email}\n💰 +${formatRupiah(amount+fee)}`);
                showToast(`Deposit ${formatRupiah(amount+fee)} dikonfirmasi untuk ${email}`);
                adminShowPending();
                if(currentUser && currentUser.email === email) { loadUserData(email); renderCurrentView(); }
            }
        }
    };
    
    function adminShowAllUsers() {
        let allUsers = JSON.parse(localStorage.getItem('merchant_users') || '{}');
        let html = '<table class="admin-table"><tr><th>Email</th><th>Saldo</th><th>Aksi</th></tr>';
        for(let email in allUsers) {
            html += `<tr><td>${email}</td><td>${formatRupiah(allUsers[email].balance || 0)}</td><td><button class="btn-small" onclick="adminAddBalanceTo('${email}')">➕ Tambah Saldo</button></td></tr>`;
        }
        html += '</table>';
        document.getElementById('adminContent').innerHTML = html;
    }
    
    window.adminAddBalanceTo = (email) => {
        let amount = prompt("Masukkan nominal tambahan saldo:", "50000");
        if(amount && !isNaN(amount)) {
            let allUsers = JSON.parse(localStorage.getItem('merchant_users') || '{}');
            if(allUsers[email]) {
                allUsers[email].balance = (allUsers[email].balance || 0) + parseInt(amount);
                let tx = { id: Date.now(), type: 'ADMIN BONUS', method: 'Manual', nominal: parseInt(amount), fee: 0, total: parseInt(amount), detail: `Tambah saldo oleh admin`, date: new Date().toISOString(), status: 'success' };
                if(!allUsers[email].transactions) allUsers[email].transactions = [];
                allUsers[email].transactions.unshift(tx);
                localStorage.setItem('merchant_users', JSON.stringify(allUsers));
                showToast(`Saldo ${email} +${formatRupiah(parseInt(amount))}`);
                adminShowAllUsers();
                if(currentUser && currentUser.email === email) { loadUserData(email); renderCurrentView(); }
            }
        }
    };
    
    function adminShowAllTransactions() {
        let allUsers = JSON.parse(localStorage.getItem('merchant_users') || '{}');
        let allTx = [];
        for(let email in allUsers) {
            if(allUsers[email].transactions) allTx.push(...allUsers[email].transactions.map(t => ({...t, userEmail: email})));
        }
        allTx.sort((a,b)=>b.id - a.id);
        let html = '<table class="admin-table"><tr><th>User</th><th>Tipe</th><th>Total</th><th>Waktu</th></tr>';
        allTx.slice(0,30).forEach(t => { html += `<tr><td>${t.userEmail.split('@')[0]}</td><td>${t.type}</td><td>${formatRupiah(t.total)}</td><td>${new Date(t.date).toLocaleString()}</td></tr>`; });
        html += '</table>';
        document.getElementById('adminContent').innerHTML = html;
    }
    
    function adminAddBalanceForm() { adminShowAllUsers(); }
    
    // Helper
    window.selectPaymentMethod = (method) => {
        selectedPaymentMethod = method;
        document.querySelectorAll('.service-card').forEach(c => c.style.borderColor = 'rgba(180,180,200,0.15)');
        let el = document.getElementById(`method${method}`);
        if(el) el.style.borderColor = '#B0BEC5';
        document.getElementById('selectedMethodText').innerText = `Metode: ${method}`;
        let amount = parseInt(document.getElementById('depositAmount')?.value) || 0;
        document.getElementById('totalBayarDisplay').innerText = formatRupiah(amount + ADMIN_FEE);
    };
    document.getElementById('depositAmount')?.addEventListener('input', () => { let a = parseInt(document.getElementById('depositAmount').value)||0; document.getElementById('totalBayarDisplay').innerText = formatRupiah(a+ADMIN_FEE); });
    document.getElementById('confirmDepositBtn')?.addEventListener('click', submitDeposit);
    window.closeModal = (id) => { document.getElementById(id).style.display = 'none'; };
    
    // Auth
    auth.onAuthStateChanged((user) => {
        if(user) {
            currentUser = user;
            isAdmin = (user.email === ADMIN_EMAIL);
            loadUserData(user.email);
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            if(isAdmin) document.getElementById('adminIndicator').innerHTML = '<div class="admin-badge">👑 ADMIN</div>';
            renderCurrentView();
            document.querySelectorAll('.nav-item').forEach(btn => { btn.addEventListener('click', (e) => { setActiveTab(btn.getAttribute('data-nav')); }); });
        } else { document.getElementById('loginSection').style.display = 'flex'; document.getElementById('appContainer').style.display = 'none'; }
    });
    function setActiveTab(tab) { currentTab = tab; renderCurrentView(); }
    document.getElementById('googleSignInBtn')?.addEventListener('click', async() => { await auth.signInWithPopup(provider); });
    
    // init global modal dynamic
    let modalDiv = document.createElement('div'); modalDiv.id = 'actionModal'; modalDiv.className = 'modal'; modalDiv.innerHTML = '<div class="modal-content" id="modalDynamicContent"></div>'; document.body.appendChild(modalDiv);
    window.closeModalGlobal = () => document.getElementById('actionModal').style.display = 'none';
    window.onclick = (e) => { if(e.target.classList && e.target.classList.contains('modal')) e.target.style.display = 'none'; };
</script>
</body>
</html>
